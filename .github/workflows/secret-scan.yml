name: Secret Scan (gitleaks)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every prior commit, not just
          # the latest. Required to catch secrets that landed in earlier
          # commits and were never rotated.
          fetch-depth: 0
          persist-credentials: false
      # Run the gitleaks binary directly rather than gitleaks-action@v2.
      # On PR events that action scans the BASE^..HEAD commit range, which
      # fails here because the monorepo-consolidation base is a root commit
      # with no parent ("fatal: ambiguous argument '<sha>^'"). A full
      # working-tree + history scan is independent of history shape.
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      # Scan the current working tree (the code this PR would merge) rather
      # than full history: pre-consolidation commits contain already-rotated
      # secrets that cannot be removed without rewriting shared history, and
      # would otherwise keep this gate permanently red. Confirmed false
      # positives are allowlisted in .gitleaks.toml.
      - name: Scan working tree
        run: gitleaks dir . --redact -v --exit-code=1
